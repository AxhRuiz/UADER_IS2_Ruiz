[pytest]
# Configuración de pytest
minversion = 7.0
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=rpn
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=90

# Archivos a ignorar
norecursedirs = .git .venv __pycache__

# Marcadores personalizados
markers =
    basico: Pruebas de operaciones básicas
    pila: Pruebas de manipulación de pila
    constantes: Pruebas de constantes matemáticas
    funciones: Pruebas de funciones matemáticas
    trigonometria: Pruebas de funciones trigonométricas
    memorias: Pruebas de sistema de memorias
    errores: Pruebas de manejo de errores
    integracion: Pruebas de integración complejas

# AÑADIR ESTA LÍNEA CRUCIAL:
python_files = test_*.py

# AÑADIR ESTA SECCIÓN:
[coverage:run]
source = .
omit = 
    */venv/*
    */test_*.py
    */__pycache__/*